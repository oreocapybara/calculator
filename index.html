<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Calculator</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<div class="main-body">
			<input type="text"  class="display" value="0" inputmode="numeric"></input>
			<div class="button-group">
				<div class="button-row">
					<button class="button" id="clear">AC</button>
					<button class="button" id="√">√</button>
					<button class="button operand" id="%">%</button>
					<button class="button operand" id="÷">÷</button>
				</div>
				<div class="button-row">
					<button class="button num" id="7">7</button>
					<button class="button num" id="8">8</button>
					<button class="button num" id="9">9</button>
					<button class="button operand" id="×">×</button>
				</div>
				<div class="button-row">
					<button class="button num" id="4">4</button>
					<button class="button num" id="5">5</button>
					<button class="button num" id="6">6</button>
					<button class="button operand" id="-">-</button>
				</div>
				<div class="button-row">
					<button class="button num" id="1">1</button>
					<button class="button num" id="2">2</button>
					<button class="button num" id="3">3</button>
					<button class="button operand" id="+">+</button>
				</div>
				<div class="button-row">
					<button class="button num" id="0">0</button>
					<button class="button decimal" id=".">.</button>
					<button class="button operand" id="+/-">+/-</button>
					<button class="button operand" id="=">=</button>
				</div>
			</div>
		</div>
	</body>
	<script src="./script.js"></script>
	<footer>@ The Odin Project</footer>
</html>
